
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Parking System</title>

<style>


{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fc;
    min-height:100vh;
}

h1{
    background:#1e3a8a;
    color:white;
    padding:25px;
    margin:0;
    font-size:32px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.parking{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.slot{
    height:180px;
    border-radius:20px;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 6px 15px rgba(0,0,0,.15);
}

.slot:hover{
    transform:translateY(-5px);
}

.empty{
    background:linear-gradient(135deg,#16a34a,#22c55e);
}

.reserved{
    background:linear-gradient(135deg,#f59e0b,#fbbf24);
}

.occupied{
    background:linear-gradient(135deg,#dc2626,#ef4444);
}

.small{
    font-size:14px;
    margin-top:8px;

}

/* ===== พื้นหลังสดใส ===== */

body{
    background:
    linear-gradient(
        135deg,
        #fff1f2,
        #fef9c3,
        #dbeafe
    );
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
}


/* วงกลมน่ารักตกแต่งพื้นหลัง */

body::before{
    content:"";
    position:fixed;
    width:250px;
    height:250px;
    background:#fde68a;
    border-radius:50%;
    top:-80px;
    left:-80px;
    opacity:.5;
    z-index:-1;
}


body::after{
    content:"";
    position:fixed;
    width:300px;
    height:300px;
    background:#bfdbfe;
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    opacity:.5;
    z-index:-1;
}


/* เพิ่มความน่ารักให้ช่องจอด */

.slot{
    border:4px solid rgba(255,255,255,.7);
}


/* ช่องว่าง */
.empty{
    background:
    linear-gradient(
    135deg,
    #34d399,
    #22c55e
    );
}


/* ช่องจอง */
.reserved{
    background:
    linear-gradient(
    135deg,
    #fbbf24,
    #fb923c
    );
}


/* ช่องไม่ว่าง */
.occupied{
    background:
    linear-gradient(
    135deg,
    #fb7185,
    #ef4444
    );
}


/* เอฟเฟกต์เด้ง */

.slot:hover{
    transform:scale(1.05);
}


/* การ์ตูนในช่อง */

.slot::before{
    content:"🚗";
    position:absolute;
    top:8px;
    right:12px;
    font-size:40px;
    opacity:.25;
}</style>

</head>
<body>

<h1>🚗 SMART PARKING SYSTEM</h1>

<div style="
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
">

<div style="
background:white;
padding:12px 20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
font-weight:bold;
">
🟢 ว่าง
</div>

<div style="
background:white;
padding:12px 20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
font-weight:bold;
">
🟡 จองแล้ว
</div>

<div style="
background:white;
padding:12px 20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
font-weight:bold;
">
🔴 ไม่ว่าง
</div>

</div>



<div class="parking">
    <div id="A1" class="slot"></div>
    <div id="A2" class="slot"></div>
    <div id="A3" class="slot"></div>
    <div id="A4" class="slot"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getDatabase,
    ref,
    onValue,
    runTransaction
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "oooooo-57092.firebaseapp.com",
  databaseURL: "https://oooooo-57092-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "oooooo-57092"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// user id ประจำเครื่อง
const myId =
localStorage.getItem("userId")
||
Math.random().toString(36).substring(2);

localStorage.setItem("userId",myId);

// เก็บข้อมูลทุกช่อง
let allParkingData = {};

onValue(ref(db,"Parking"),(snap)=>{
    allParkingData = snap.val() || {};
});

// จอง / ยกเลิก
function toggleParking(slot){

    const slotRef = ref(db,"Parking/"+slot);

    runTransaction(slotRef,(data)=>{

        if(!data){
            return {
                status:"reserved",
                owner:myId,
                startTime:Date.now()
            };
        }

        // รถจอดแล้ว
        if(data.status === "occupied"){
            return data;
        }

        // จองแล้ว
        if(data.status === "reserved"){

            // เจ้าของยกเลิกได้
            if(data.owner === myId){
                return {
                    status:"empty",
                    owner:"",
                    startTime:0
                };
            }

            return data;
        }

        // ช่องว่าง
        if(data.status === "empty"){

            // เช็คว่าจองช่องอื่นอยู่ไหม
            for(const key in allParkingData){

                const item = allParkingData[key];

                if(
                    item &&
                    item.status === "reserved" &&
                    item.owner === myId
                ){
                    alert("!!อ้ะอาลูกค้าสามารถจองได้แค่ช่องจอดเดียวนะคะ!!");
                    return data;
                }
            }

            return {
                status:"reserved",
                owner:myId,
                startTime:Date.now()
            };
        }

        return data;
    });

}

window.toggleParking = toggleParking;

// realtime
["A1","A2","A3","A4"].forEach(slot=>{

    onValue(ref(db,"Parking/"+slot),(snap)=>{

        const data = snap.val();
        const div = document.getElementById(slot);

        if(!data){
            div.className="slot empty";
            div.innerHTML=`
                <div>${slot}</div>
                <div>🟢 ว่าง</div>
            `;
            div.onclick=()=>toggleParking(slot);
            return;
        }

        const isOwner =
        data.owner === myId;

        // ไม่ว่าง
        if(data.status==="occupied"){

            div.className="slot occupied";

            div.innerHTML=`
                <div>${slot}</div>
                <div>🔴 ไม่ว่าง</div>
            `;

            div.onclick=null;
        }

        // จองแล้ว
        else if(data.status==="reserved"){

            div.className="slot reserved";

            div.innerHTML=`
                <div>${slot}</div>
                <div>🟡 จองแล้ว</div>
                <div class="small">
                    ${
                    isOwner
                    ? "👤 ของคุณ (กดยกเลิกได้)"
                    : "🔒 คนอื่นจองอยู่"
                    }
                </div>
            `;

            div.onclick =
            isOwner
            ? ()=>toggleParking(slot)
            : null;
        }

        // ว่าง
        else{

            div.className="slot empty";

            div.innerHTML=`
                <div>${slot}</div>
                <div>🟢 ว่าง</div>
            `;

            div.onclick=
            ()=>toggleParking(slot);
        }

    });

});

</script>

</body>
</html>
